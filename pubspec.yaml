name: dose_certa
description: Dose Certa - Seu companheiro inteligente para gerenciamento de medicamentos, lembretes e controle de estoque médico.
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.6
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Dependency Injection
  get_it: ^7.6.7
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  timezone: ^0.9.2
  
  # Maps & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^10.1.0
  
  # HTTP & API
  http: ^1.1.2
  
  # Utilities
  # intl removed (not referenced in code)
  shared_preferences: ^2.2.2
  permission_handler: ^11.2.0
  url_launcher: ^6.2.4
  
  # UI Enhancements
  google_fonts: ^5.0.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  build_runner: ^2.4.7

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path_android: "assets/images/logo.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
  adaptive_icon_background: "#301004"
  adaptive_icon_foreground: "assets/images/logo.png"
  adaptive_icon_monochrome: "assets/images/logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    